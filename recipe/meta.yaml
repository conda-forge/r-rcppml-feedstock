{% set version = "0.3.7.1" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-rcppml
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/RcppML_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/RcppML/RcppML_{{ version }}.tar.gz
  sha256: 9a2e2556b436504b270ac29b31d7a72c07fe5f34d48562e5930366fb228aae4b

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ compiler('fortran') }}        # [osx and arm64]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - libgomp                      # [linux]
    - llvm-openmp                  # [osx]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
    - r-matrix                     # [build_platform != target_platform]
    - r-rcpp                       # [build_platform != target_platform]
    - r-rcppeigen                  # [build_platform != target_platform]
  host:
    - r-base
    - r-matrix
    - r-rcpp
    - r-rcppeigen
  run:
    - r-base
    - r-matrix
    - r-rcpp
    - r-rcppeigen

test:
  commands:
    - $R -e "library('RcppML')"           # [not win]
    - "\"%R%\" -e \"library('RcppML')\""  # [win]

about:
  home: https://github.com/zdebruine/RcppML
  license: GPL-2.0-or-later
  summary: Fast machine learning algorithms including matrix factorization and divisive clustering for large sparse and dense matrices.
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'

extra:
  recipe-maintainers:
    - conda-forge/r

